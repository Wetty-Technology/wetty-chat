name: voice_message
description: OGG/Opus to M4A/AAC transcoding and audio waveform extraction for iOS and macOS.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: VoiceMessagePlugin
        sharedDarwinSource: true
      macos:
        pluginClass: VoiceMessagePlugin
        sharedDarwinSource: true
