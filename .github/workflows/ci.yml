name: CI

on:
  push:
    branches:
      - "main"
      - "release/*"
    paths:
      - "backend/**"
      - "wetty-chat-mobile/**"
      - ".github/workflows/**"
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'wetty-chat-mobile/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo check
        run: cargo check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  frontend-typecheck:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wetty-chat-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wetty-chat-mobile/package-lock.json
      - name: npm ci
        run: npm ci
      - name: npm run typecheck
        run: npm run typecheck

  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wetty-chat-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wetty-chat-mobile/package-lock.json
      - name: npm ci
        run: npm ci
      - name: npm run lint
        run: npm run lint

  frontend-format:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wetty-chat-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wetty-chat-mobile/package-lock.json
      - name: npm ci
        run: npm ci
      - name: npm run format:ci
        run: npm run format:ci

  check:
    name: check
    needs:
      - changes
      - backend
      - frontend-typecheck
      - frontend-lint
      - frontend-format
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate CI results
        run: |
          backend_result="${{ needs.backend.result }}"
          frontend_typecheck_result="${{ needs.frontend-typecheck.result }}"
          frontend_lint_result="${{ needs.frontend-lint.result }}"
          frontend_format_result="${{ needs.frontend-format.result }}"

          echo "backend result: ${backend_result}"
          echo "frontend typecheck result: ${frontend_typecheck_result}"
          echo "frontend lint result: ${frontend_lint_result}"
          echo "frontend format result: ${frontend_format_result}"

          if [[ "${backend_result}" != "success" && "${backend_result}" != "skipped" ]]; then
            exit 1
          fi

          if [[ "${frontend_typecheck_result}" != "success" && "${frontend_typecheck_result}" != "skipped" ]]; then
            exit 1
          fi

          if [[ "${frontend_lint_result}" != "success" && "${frontend_lint_result}" != "skipped" ]]; then
            exit 1
          fi

          if [[ "${frontend_format_result}" != "success" && "${frontend_format_result}" != "skipped" ]]; then
            exit 1
          fi
